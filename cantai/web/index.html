<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cantai - Planejamento de Hinos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <h1>🎼 Cantai</h1>
    <p class="subtitle">Planejamento de Hinos</p>
  </header>

  <main class="container">
    <section class="card">
      <h2>Momento do culto</h2>
      <select id="momento">
        <option value="Adoração">Adoração</option>
        <option value="Ação de Graças">Ação de Graças</option>
        <option value="Confiança" selected>Confiança</option>
        <option value="Consagração">Consagração</option>
        <option value="Evangelho">Evangelho</option>
        <option value="Envio">Envio</option>
        <option value="Oração">Oração</option>
        <option value="Louvor">Louvor</option>
        <option value="Comunhão">Comunhão</option>
        <option value="Afirmação de Fé">Afirmação de Fé</option>
        <option value="Confissão">Confissão</option>
        <option value="Intercessão">Intercessão</option>
        <option value="Paixão de Cristo">Paixão de Cristo</option>
        <option value="Advento">Advento</option>
        <option value="Emergência">Emergência</option>
        <option value="Obediência">Obediência</option>
        <option value="Aniversário">Aniversário</option>
      </select>
    </section>

    <section class="card">
      <h2>Hinários</h2>
      <div class="checkbox-group">
        <label class="checkbox-label">
          <input type="checkbox" id="hctp" checked>
          <span>Cantai Todos os Povos</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="harpa" checked>
          <span>Harpa Cristã</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="cantor" checked>
          <span>Cantor Cristão</span>
        </label>
      </div>
    </section>

    <section class="card">
      <h2>Evitar repetição</h2>
      <select id="repeticao">
        <option value="30">30 dias</option>
        <option value="60">60 dias</option>
        <option value="90" selected>90 dias</option>
        <option value="180">180 dias</option>
        <option value="365">1 ano</option>
      </select>
    </section>

    <section class="card">
      <h2>Procurar hino</h2>
      <input
        type="text"
        id="busca"
        class="input-busca"
        placeholder="🔍 Procurar hino..."
        autocomplete="off"
      >
    </section>

    <button class="btn-primary" id="btn-sugerir" onclick="suggestHymns()">
      🎵 SUGERIR HINOS
    </button>

    <section id="resultados" class="resultados"></section>
  </main>

  <footer class="footer">
    <p>Versão: <span id="db-version">-</span> · <span id="db-count">-</span> hinos carregados</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
