<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cantai - Planejamento de Hinos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <h1> Cantai</h1>
    <p class="subtitle">Planejamento de Hinos</p>
  </header>

  <main class="container">
    <section class="card">
      <h2>Busca</h2>
      <input
        type="text"
        id="busca"
        class="input-busca"
        placeholder="Procurar por numero, titulo, letra..."
        autocomplete="off"
      >
      <div id="busca-info" class="busca-info" style="display:none"></div>
    </section>

    <section id="resultados-busca" class="resultados" style="display:none"></section>

    <section class="card">
      <h2>Tema</h2>
      <select id="tema"></select>
    </section>

    <section class="card">
      <h2>Hinarios</h2>
      <div class="checkbox-group">
        <label class="checkbox-label">
          <input type="checkbox" id="hctp" checked>
          <span>Cantai Todos os Povos</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="harpa" checked>
          <span>Harpa Crista</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="cantor" checked>
          <span>Cantor Cristao</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="sh" checked>
          <span>Salmos e Hinos</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="nc" checked>
          <span>Novo Cantico</span>
        </label>
      </div>
    </section>

    <section class="card">
      <h2>Evitar repeticao</h2>
      <select id="repeticao">
        <option value="30">30 dias</option>
        <option value="60">60 dias</option>
        <option value="90" selected>90 dias</option>
        <option value="180">180 dias</option>
        <option value="365">1 ano</option>
      </select>
    </section>

    <button class="btn-primary" id="btn-sugerir" onclick="suggestHymns()">
      SUGERIR HINOS
    </button>

    <section id="resultados" class="resultados"></section>

    <section id="secao-culto" class="card card-culto" style="display:none">
      <h2>Hinos deste culto</h2>
      <div id="culto-lista" class="culto-lista"></div>
      <div class="culto-botoes">
        <button class="btn-copiar" id="btn-copiar" onclick="copyProgramacao()">
          Copiar programacao
        </button>
        <button class="btn-novas" onclick="suggestHymns()">
          Nova sugestao
        </button>
      </div>
    </section>

    <section class="card card-dados">
      <h2>Dados</h2>
      <div class="dados-botoes">
        <button class="btn-dado" onclick="openHistorico()">Ultimos cultos</button>
        <button class="btn-dado" onclick="exportHistorico()">Exportar historico</button>
        <button class="btn-dado" onclick="importHistorico()">Importar historico</button>
        <button class="btn-dado btn-dado-perigo" onclick="limparHistorico()">Limpar este culto</button>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>Versao: <span id="db-version">-</span> . <span id="db-count">-</span> hinos carregados</p>
    <p><a href="#" onclick="openSobre(); return false;" class="footer-link">Sobre</a></p>
  </footer>

  <div id="modal-letra" class="modal" onclick="closeModal(event, 'modal-letra')">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-hinario" id="modal-hinario"></span>
        <span class="modal-numero" id="modal-numero"></span>
        <button class="modal-close" onclick="closeModalById('modal-letra')">X</button>
      </div>
      <h3 class="modal-titulo" id="modal-titulo"></h3>
      <p class="modal-primeira-linha" id="modal-primeira-linha"></p>
      <div class="modal-letra-texto" id="modal-letra-texto"></div>
      <div class="modal-footer">
        <button class="btn-modal-close" onclick="closeModalById('modal-letra')">Fechar</button>
        <button class="btn-modal-escolher" id="modal-btn-escolher" onclick="chooseFromModal()">Escolher</button>
      </div>
    </div>
  </div>

  <div id="modal-sobre" class="modal" onclick="closeModal(event, 'modal-sobre')">
    <div class="modal-content modal-sobre-content">
      <button class="modal-close" onclick="closeModalById('modal-sobre')">X</button>
      <h2>Cantai</h2>
      <p class="sobre-descricao">Planejamento de Hinos para cultos e eventos da igreja.</p>
      <div class="sobre-info">
        <p><strong>Versao:</strong> <span id="sobre-versao">1.2</span></p>
        <p><strong>Total de hinos:</strong> <span id="sobre-count">0</span></p>
        <p><strong>Licenca:</strong> MIT</p>
        <p><strong>GitHub:</strong> <a href="https://github.com/Vangl-dev/Cantai" target="_blank">github.com/Vangl-dev/Cantai</a></p>
      </div>
    </div>
  </div>

  <div id="modal-historico" class="modal" onclick="closeModal(event, 'modal-historico')">
    <div class="modal-content modal-historico-content">
      <div class="modal-header">
        <span class="modal-hinario">HISTORICO</span>
        <button class="modal-close" onclick="closeModalById('modal-historico')">X</button>
      </div>
      <div id="historico-lista" class="historico-lista"></div>
      <div class="modal-footer">
        <button class="btn-modal-close" onclick="limparHistoricoCompleto()">Limpar tudo</button>
        <button class="btn-modal-close" onclick="closeModalById('modal-historico')">Fechar</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
